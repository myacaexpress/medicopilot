# Fly.io configuration for medicopilot-server
#
# Deploy:
#   cd server
#   fly launch --no-deploy   # first time only — creates app
#   fly deploy               # subsequent deploys
#
# Secrets (set once per environment):
#   fly secrets set DEEPGRAM_API_KEY=... ANTHROPIC_API_KEY=... (P2+)

app = "medicopilot-api"
primary_region = "iad"      # same as plan vendors; low latency to Anthropic + Deepgram US East

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"
  LOG_LEVEL = "info"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"    # P2: keep warm while calls run; suspend when idle
  auto_start_machines = true
  min_machines_running = 0          # scale to zero when no calls — cheap for MVP
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
